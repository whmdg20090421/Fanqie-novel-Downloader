name: Build and Release (Source Only)

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "是否创建 GitHub Release"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current repository (public code)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 打包 Python 源码为 ZIP
        run: |
          zip -r Fanqie-novel-source.zip . -i "*.py" "*.md" "config/" "tools/"

      - name: 上传源码 ZIP 作为构建产物
        uses: actions/upload-artifact@v4
        with:
          name: Fanqie-novel-source
          path: Fanqie-novel-source.zip
          if-no-files-found: error
          retention-days: 30

      - name: 上传源码 ZIP 到 GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event.inputs.publish_release == 'true'
        with:
          tag_name: v${{ github.run_number }}
          name: Fanqie-novel Source ${{ github.run_number }}
          files: Fanqie-novel-source.zip

  summary:
    needs: package-source
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Workflow summary
        run: |
          echo "✅ 源码打包完成" >> "$GITHUB_STEP_SUMMARY"
          echo "📦 产物: Fanqie-novel-source.zip" >> "$GITHUB_STEP_SUMMARY"
